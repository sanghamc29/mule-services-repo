custom-error-code-prefix: "ORG_MB"
application:
 name: "${project.artifactId}"
api:
 name: "${project.artifactId}"
 instanceId: "11"
 version: "${api.build.version}"
 http:
  listener:
   path: "/api/${api.name}/${api.version}/*"
   host: "0.0.0.0"
  
sf:
  sapi:
    host: "salesforce-credit-sapi-dev-nnkf7u.lonthm.deu-c1.cloudhub.io"
    #host: "127.0.0.1"
    port: "443"
    protocol: "HTTPS"
    basePath: "/api/salesforce-credit-sapi/v3"
    response:
      timeout: "60000" 
    aml-verify:
      path: "/applications/{applicationId}/amlVerification"
    creditDecision:
      path: "/applications/{applicationId}/creditDecisions"
  keystore: "${app.home}/ms-to-sf.jks"
  certAlias: "ms-to-sf"
  principal: "mulesoft@salesforce.com.integrationuser.ohqa"
  aud: "https://test.salesforce.com"
  tokenEndpoint: "https://test.salesforce.com/services/oauth2/token"       
    
    
