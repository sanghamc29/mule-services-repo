    timeout: "300000"
  credit:
    method: "PATCH"
    path: "/credit/{applicationId}"
  client:
    id: "1ad597f688a6412499cdea319bfbf1bf"
#property http.port is replaced by CloudHub 2.0 during the deployment
http:
  port: "8081"
  
client: 
  id: "7ac35767d77e41008eb32292aaddfa4a"
mq:
  url: "https://mq-eu-west-1.anypoint.mulesoft.com/api/v1/organizations/c83a2291-ce49-4c83-a453-39a63be34c6c/environments/e52d7089-ab1c-412f-9a8e-f189d1f94417"
  clientId: "b7f360d11e87417c88ef847340ff20b2"
  events:
    queue: "Q.ALFA.MBFS.CREDIT.SFDC.DEV.V1"
    dlq: "DLQ.ALFA.MBFS.CREDIT.SFDC.DEV.V1"
  syncUpdateCreditApp:
    queue: "Q.SFDC.MBFS.CREDIT-UPDATES.MB-ADVANTAGE.DEV.V1"
    dlq: "DLQ.SFDC.MBFS.CREDIT-UPDATES.MB-ADVANTAGE.DEV.V1"
  reconnection:
    attempts: "2"
    frequency: "2000"
  applicationOutbound:
    queue: "Q.SFDC.MBFS.CREDIT-APPLICATION.MB-ADVANTAGE.DEV.V1"
    dlq: "DLQ.SFDC.MBFS.CREDIT-APPLICATION.MB-ADVANTAGE.DEV.V1"
  creditApplicationEnrichment:
    queue: "Q.CREDIT-APP-PAPI.MBFS.CREDIT-APPLICATION-ENRICHMENT.SFDC.DEV.V1"
    dlq: "DLQ.CREDIT-APP-PAPI.MBFS.CREDIT-APPLICATION-ENRICHMENT.SFDC.DEV.V1"
  decisionOutbound:
    queue: "Q.SFDC.MBFS.CREDIT-APPLICATION-DECISION.SFDC.DEV.V1"
    dlq: "DLQ.SFDC.MBFS.CREDIT-APPLICATION-DECISION.SFDC.DEV.V1"
  amlDecisionOutbound:
    queue: "Q.SFDC.MBFS.CREDIT-APPLICATION-AML.VERIFY.DEV.V1"
    dlq: "DLQ.SFDC.MBFS.CREDIT-APPLICATION-AML.VERIFY.DEV.V1"
  creditDecisionOutbound:
    queue: "Q.SFDC.MBFS.CREDIT-APPLICATION-DECISION.MILES.DEV.V1"
    dlq: "DLQ.SFDC.MBFS.CREDIT-APPLICATION-DECISION.MILES.DEV.V1"

